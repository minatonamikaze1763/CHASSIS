<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>PDF Editor</title>

    <style>
      :root {
        --bg: #f4f6f8;
        --card: #fff;
        --text: #111827;
        --line: #d1d5db;
        --brand: #2563eb;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          Segoe UI,
          Arial,
          sans-serif;
        background: var(--bg);
        padding: 20px;
        color: var(--text);
      }
      .wrap {
        max-width: 1400px;
        margin: auto;
      }
      h1 {
        margin-bottom: 15px;
      }
      .layout {
        display: grid;
        grid-template-columns: 390px 1fr;
        gap: 18px;
      }
      .panel {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 16px;
      }
      .dropzone {
        border: 2px dashed var(--brand);
        padding: 9rem 25px;
        text-align: center;
        border-radius: 12px;
        cursor: pointer;
      }
      button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 700;
      }
      .primary {
        background: var(--brand);
        color: #fff;
      }
      .secondary {
        background: #e5e7eb;
      }
      #stageWrap {
        overflow: auto;
        background: #e5e7eb;
        padding: 15px;
        border-radius: 12px;
      }
      .pageBox {
        position: relative;
        display: inline-block;
        background: #fff;
      }
      .overlay {
        position: absolute;
        border: 2px dashed #16a34a;
        min-width: 50px;
        min-height: 50px;
        cursor: move;
      }
      .overlay img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        pointer-events: none;
      }
      .handle {
        position: absolute;
        right: -8px;
        bottom: -8px;
        width: 16px;
        height: 16px;
        background: #16a34a;
        border-radius: 50%;
        cursor: nwse-resize;
      }
      #fileList {
        font-size: 13px;
        margin-top: 10px;
        max-height: 200px;
        overflow: auto;
      }
      canvas {
        display: block;
      }
      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>PDF EDITOR</h1>

      <div class="layout">
        <div class="panel">
          <div class="dropzone" id="dropZone">Drop PDF + Images Here</div>

          <input
            type="file"
            id="fileInput"
            multiple
            hidden
            accept=".pdf,image/*"
          />

          <div style="margin-top: 15px">
            <label>
              <input type="checkbox" id="pencilMode" />
              Convert dropped images to Pencil Scratch
            </label>
          </div>

          <hr style="margin: 15px 0" />

          <b>Placed Images List</b>
          <div id="fileList"></div>

          <button class="primary" id="downloadBtn">Download PDF</button>
          <button class="secondary" id="resetBtn">Reset</button>
        </div>

        <div class="panel">
          <div id="stageWrap">
            <div id="pageBox" class="pageBox">
              <canvas id="pageCanvas"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <script>
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

      const dropZone = document.getElementById("dropZone");
      const fileInput = document.getElementById("fileInput");
      const pageCanvas = document.getElementById("pageCanvas");
      const pageCtx = pageCanvas.getContext("2d");
      const pageBox = document.getElementById("pageBox");
      const fileList = document.getElementById("fileList");

      let pdfFile = null;

      let viewport = null;
      let overlays = [];

      dropZone.onclick = () => fileInput.click();

      ["dragenter", "dragover"].forEach((e) => {
        dropZone.addEventListener(e, (x) => {
          x.preventDefault();
        });
      });

      dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        handleFiles([...e.dataTransfer.files]);
      });

      fileInput.addEventListener("change", (e) => {
        handleFiles([...e.target.files]);
      });

      async function handleFiles(files) {
        for (const file of files) {
          if (!pdfFile && file.type === "application/pdf") {
            pdfFile = file;
            await loadPDF(file);
            continue;
          }

          if (file.type.startsWith("image/")) {
            createImageOverlay(file);
          }
        }
      }

      let originalPdfBuffer = null;

      async function loadPDF(file) {
        originalPdfBuffer = await file.arrayBuffer();

        const previewBytes = new Uint8Array(originalPdfBuffer.slice(0));

        const pdf = await pdfjsLib.getDocument({
          data: previewBytes,
        }).promise;

        const page = await pdf.getPage(1);

        viewport = page.getViewport({
          scale: 1.2,
        });

        pageCanvas.width = viewport.width;
        pageCanvas.height = viewport.height;

        await page.render({
          canvasContext: pageCtx,
          viewport,
        }).promise;

        pageBox.style.width = viewport.width + "px";
        pageBox.style.height = viewport.height + "px";
      }
      async function createImageOverlay(file) {
        let url = URL.createObjectURL(file);

        if (document.getElementById("pencilMode").checked) {
          const img = new Image();

          await new Promise((resolve) => {
            img.onload = resolve;
            img.src = url;
          });

          url = imageToPencil(img);
        }
        const div = document.createElement("div");
        div.className = "overlay";
        div.style.left = "50px";
        div.style.top = "50px";
        div.style.width = "180px";
        div.style.height = "100px";

        div.innerHTML = `
      <img src="${url}">
      <div class="handle"></div>
      `;

        pageBox.appendChild(div);
        const previewImg = div.querySelector("img");

        if (document.getElementById("pencilMode").checked) {
          const source = new Image();

          source.onload = () => {
            previewImg.src = imageToPencil(source);
          };

          source.src = url;
        }
        makeInteractive(div);

        overlays.push({
          file,
          element: div,
          url,
        });

        const row = document.createElement("div");
        row.textContent = file.name;
        fileList.appendChild(row);
      }

      function makeInteractive(box) {
        const handle = box.querySelector(".handle");

        let mode = null,
          sx,
          sy,
          sl,
          st,
          sw,
          sh;

        box.addEventListener("mousedown", (e) => {
          mode = e.target === handle ? "resize" : "move";
          sx = e.clientX;
          sy = e.clientY;
          sl = box.offsetLeft;
          st = box.offsetTop;
          sw = box.offsetWidth;
          sh = box.offsetHeight;
        });

        document.addEventListener("mousemove", (e) => {
          if (!mode) return;

          const dx = e.clientX - sx;
          const dy = e.clientY - sy;

          if (mode === "move") {
            box.style.left = sl + dx + "px";
            box.style.top = st + dy + "px";
          } else {
            box.style.width = Math.max(50, sw + dx) + "px";
            box.style.height = Math.max(50, sh + dy) + "px";
          }
        });

        document.addEventListener("mouseup", () => (mode = null));
      }

      function imageToPencil(img) {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = img.width;
        canvas.height = img.height;

        ctx.drawImage(img, 0, 0);

        const width = canvas.width;
        const height = canvas.height;

        let original = ctx.getImageData(0, 0, width, height);

        let gray = new Uint8ClampedArray(original.data);

        // Grayscale
        for (let i = 0; i < gray.length; i += 4) {
          const g = gray[i] * 0.299 + gray[i + 1] * 0.587 + gray[i + 2] * 0.114;

          gray[i] = g;
          gray[i + 1] = g;
          gray[i + 2] = g;
        }

        // Invert
        let inverted = new Uint8ClampedArray(gray);

        for (let i = 0; i < inverted.length; i += 4) {
          inverted[i] = 255 - inverted[i];
          inverted[i + 1] = 255 - inverted[i + 1];
          inverted[i + 2] = 255 - inverted[i + 2];
        }

        // Blur
        let blurred = new Uint8ClampedArray(inverted);

        const radius = 6;

        for (let y = 0; y < height; y++) {
          for (let x = 0; x < width; x++) {
            let total = 0;
            let count = 0;

            for (let dy = -radius; dy <= radius; dy++) {
              for (let dx = -radius; dx <= radius; dx++) {
                const nx = x + dx;
                const ny = y + dy;

                if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                  const idx = (ny * width + nx) * 4;

                  total += inverted[idx];
                  count++;
                }
              }
            }

            const avg = total / count;

            const idx = (y * width + x) * 4;

            blurred[idx] = avg;
            blurred[idx + 1] = avg;
            blurred[idx + 2] = avg;
          }
        }

        const result = ctx.createImageData(width, height);

        // Color Dodge
        for (let i = 0; i < gray.length; i += 4) {
          const base = gray[i];
          const blend = blurred[i];

          const val =
            blend === 255 ? 255 : Math.min(255, (base * 255) / (255 - blend));

          result.data[i] = val;
          result.data[i + 1] = val;
          result.data[i + 2] = val;
          result.data[i + 3] = 255;
        }

        // Grain
        for (let i = 0; i < result.data.length; i += 4) {
          const grain = Math.random() * 12 - 6;

          result.data[i] += grain;
          result.data[i + 1] += grain;
          result.data[i + 2] += grain;
        }

        ctx.putImageData(result, 0, 0);

        return canvas.toDataURL("image/png");
      }
      document
        .getElementById("downloadBtn")
        .addEventListener("click", async () => {
          if (!originalPdfBuffer) {
            alert("Drop a PDF first");
            return;
          }

          const pdfDoc = await PDFLib.PDFDocument.load(
            originalPdfBuffer.slice(0),
          );
          const page = pdfDoc.getPages()[0];

          for (const item of overlays) {
            let bytes = await item.file.arrayBuffer();

            if (document.getElementById("pencilMode").checked) {
              const img = new Image();

              await new Promise((resolve) => {
                img.onload = resolve;
                img.src = item.url;
              });

              const data = imageToPencil(img);
              bytes = await (await fetch(data)).arrayBuffer();
            }

            const embedded = await pdfDoc.embedPng(bytes).catch(async () => {
              return await pdfDoc.embedJpg(bytes);
            });

            const scaleX = page.getWidth() / viewport.width;
            const scaleY = page.getHeight() / viewport.height;

            const el = item.element;

            page.drawImage(embedded, {
              x: el.offsetLeft * scaleX,
              y: page.getHeight() - (el.offsetTop + el.offsetHeight) * scaleY,
              width: el.offsetWidth * scaleX,
              height: el.offsetHeight * scaleY,
            });
          }

          const out = await pdfDoc.save();

          const blob = new Blob([out], { type: "application/pdf" });

          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = "modified.pdf";
          a.click();
        });

      document.getElementById("resetBtn").addEventListener("click", () => {
        location.reload();
      });
      async function updatePreviews() {
        const pencil = document.getElementById("pencilMode").checked;

        for (const item of overlays) {
          const img = item.element.querySelector("img");

          if (pencil) {
            const source = new Image();

            await new Promise((resolve) => {
              source.onload = resolve;
              source.src = item.url;
            });

            img.src = imageToPencil(source);
          } else {
            img.src = item.url;
          }
        }
      }
      document
        .getElementById("pencilMode")
        .addEventListener("change", updatePreviews);
    </script>
  </body>
</html>
